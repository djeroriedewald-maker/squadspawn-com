<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="SquadSpawn">
    <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FF003C" stop-opacity="0.35" />
            <stop offset="60%" stop-color="#FF003C" stop-opacity="0" />
        </radialGradient>
    </defs>
    <!-- Background: rounded square, near-black with warm tone -->
    <rect width="512" height="512" rx="96" fill="#14121A" />
    <!-- Soft red glow -->
    <circle cx="256" cy="256" r="180" fill="url(#glow)" />
    <!-- Outer ring -->
    <circle cx="256" cy="256" r="104" fill="none" stroke="#E6002E" stroke-width="18" />
    <!-- Crosshair tick marks -->
    <g stroke="#E6002E" stroke-width="22" stroke-linecap="round">
        <line x1="256" y1="88"  x2="256" y2="160" />
        <line x1="256" y1="352" x2="256" y2="424" />
        <line x1="88"  y1="256" x2="160" y2="256" />
        <line x1="352" y1="256" x2="424" y2="256" />
    </g>
    <!-- Center dot -->
    <circle cx="256" cy="256" r="20" fill="#E6002E" />
</svg>

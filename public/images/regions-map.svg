<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <filter id="rm-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rm-glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rm-pulse" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rm-glow-line" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="rm-node-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <radialGradient id="rm-node-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </radialGradient>

    <radialGradient id="rm-ambient1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rm-ambient2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient glows -->
  <ellipse cx="300" cy="150" rx="280" ry="140" fill="url(#rm-ambient1)"/>
  <ellipse cx="350" cy="170" rx="200" ry="120" fill="url(#rm-ambient2)"/>

  <!-- Scattered background dots forming loose landmass shapes -->
  <g opacity="0.15">
    <!-- Myanmar/Thailand cluster -->
    <circle cx="155" cy="80" r="2" fill="#7C3AED"/>
    <circle cx="165" cy="75" r="1.5" fill="#7C3AED"/>
    <circle cx="170" cy="88" r="2" fill="#7C3AED"/>
    <circle cx="180" cy="95" r="1.5" fill="#7C3AED"/>
    <circle cx="190" cy="100" r="2" fill="#7C3AED"/>
    <circle cx="195" cy="115" r="1.5" fill="#7C3AED"/>
    <circle cx="205" cy="125" r="1.5" fill="#7C3AED"/>
    <circle cx="210" cy="105" r="2" fill="#7C3AED"/>
    <circle cx="200" cy="90" r="1.5" fill="#7C3AED"/>
    <!-- Vietnam coast -->
    <circle cx="250" cy="90" r="1.5" fill="#22C55E"/>
    <circle cx="255" cy="100" r="2" fill="#22C55E"/>
    <circle cx="260" cy="115" r="1.5" fill="#22C55E"/>
    <circle cx="258" cy="128" r="2" fill="#22C55E"/>
    <circle cx="252" cy="140" r="1.5" fill="#22C55E"/>
    <circle cx="248" cy="150" r="1.5" fill="#22C55E"/>
    <circle cx="245" cy="125" r="1" fill="#22C55E"/>
    <!-- Cambodia -->
    <circle cx="235" cy="130" r="1.5" fill="#7C3AED"/>
    <circle cx="240" cy="140" r="1.5" fill="#7C3AED"/>
    <!-- Malaysia peninsula -->
    <circle cx="215" cy="165" r="1.5" fill="#22C55E"/>
    <circle cx="220" cy="175" r="2" fill="#22C55E"/>
    <circle cx="225" cy="185" r="1.5" fill="#22C55E"/>
    <circle cx="228" cy="198" r="1.5" fill="#22C55E"/>
    <circle cx="232" cy="205" r="1" fill="#22C55E"/>
    <!-- Borneo -->
    <circle cx="300" cy="170" r="2" fill="#7C3AED"/>
    <circle cx="310" cy="165" r="2" fill="#7C3AED"/>
    <circle cx="320" cy="170" r="1.5" fill="#7C3AED"/>
    <circle cx="305" cy="180" r="1.5" fill="#7C3AED"/>
    <circle cx="315" cy="185" r="2" fill="#7C3AED"/>
    <circle cx="295" cy="175" r="1" fill="#7C3AED"/>
    <!-- Indonesia archipelago -->
    <circle cx="260" cy="235" r="1.5" fill="#22C55E"/>
    <circle cx="275" cy="238" r="2" fill="#22C55E"/>
    <circle cx="290" cy="235" r="1.5" fill="#22C55E"/>
    <circle cx="305" cy="232" r="2" fill="#22C55E"/>
    <circle cx="320" cy="235" r="1.5" fill="#22C55E"/>
    <circle cx="335" cy="230" r="2" fill="#22C55E"/>
    <circle cx="350" cy="233" r="1.5" fill="#22C55E"/>
    <circle cx="365" cy="228" r="1.5" fill="#22C55E"/>
    <circle cx="380" cy="225" r="1" fill="#22C55E"/>
    <circle cx="395" cy="230" r="1.5" fill="#7C3AED"/>
    <circle cx="410" cy="228" r="1" fill="#7C3AED"/>
    <!-- Sumatra -->
    <circle cx="195" cy="215" r="1.5" fill="#7C3AED"/>
    <circle cx="205" cy="225" r="2" fill="#7C3AED"/>
    <circle cx="215" cy="235" r="1.5" fill="#7C3AED"/>
    <circle cx="230" cy="240" r="1.5" fill="#7C3AED"/>
    <circle cx="245" cy="238" r="1" fill="#7C3AED"/>
    <!-- Philippines islands -->
    <circle cx="365" cy="85" r="1.5" fill="#22C55E"/>
    <circle cx="375" cy="90" r="2" fill="#22C55E"/>
    <circle cx="380" cy="105" r="1.5" fill="#22C55E"/>
    <circle cx="370" cy="115" r="2" fill="#22C55E"/>
    <circle cx="378" cy="125" r="1.5" fill="#22C55E"/>
    <circle cx="385" cy="95" r="1" fill="#22C55E"/>
    <circle cx="360" cy="100" r="1.5" fill="#22C55E"/>
    <circle cx="372" cy="140" r="1.5" fill="#7C3AED"/>
    <circle cx="380" cy="150" r="1" fill="#7C3AED"/>
    <circle cx="388" cy="135" r="1" fill="#7C3AED"/>
    <!-- Mindanao -->
    <circle cx="395" cy="155" r="1.5" fill="#7C3AED"/>
    <circle cx="385" cy="160" r="1" fill="#7C3AED"/>
  </g>

  <!-- Connection lines between major nodes -->
  <g filter="url(#rm-glow-line)">
    <line x1="200" y1="110" x2="260" y2="105" stroke="#7C3AED" stroke-width="1" opacity="0.35"/>
    <line x1="200" y1="110" x2="225" y2="190" stroke="#22C55E" stroke-width="0.8" opacity="0.3"/>
    <line x1="260" y1="105" x2="370" y2="100" stroke="#A78BFA" stroke-width="0.8" opacity="0.3"/>
    <line x1="225" y1="190" x2="235" y2="210" stroke="#4ADE80" stroke-width="1.2" opacity="0.45"/>
    <line x1="235" y1="210" x2="310" y2="230" stroke="#22C55E" stroke-width="0.8" opacity="0.3"/>
    <line x1="225" y1="190" x2="310" y2="230" stroke="#7C3AED" stroke-width="0.7" opacity="0.25"/>
    <line x1="370" y1="100" x2="310" y2="230" stroke="#A78BFA" stroke-width="0.6" opacity="0.2"/>
    <line x1="200" y1="110" x2="245" y2="135" stroke="#7C3AED" stroke-width="0.6" opacity="0.2"/>
    <line x1="260" y1="105" x2="245" y2="135" stroke="#22C55E" stroke-width="0.6" opacity="0.2"/>
    <line x1="235" y1="210" x2="370" y2="100" stroke="#A78BFA" stroke-width="0.5" opacity="0.15"/>
  </g>

  <!-- Pulse rings around major nodes -->
  <circle cx="200" cy="110" r="18" fill="none" stroke="#7C3AED" stroke-width="0.8" opacity="0.15"/>
  <circle cx="200" cy="110" r="28" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.08"/>
  <circle cx="260" cy="105" r="16" fill="none" stroke="#22C55E" stroke-width="0.8" opacity="0.15"/>
  <circle cx="260" cy="105" r="25" fill="none" stroke="#22C55E" stroke-width="0.5" opacity="0.08"/>
  <circle cx="370" cy="100" r="20" fill="none" stroke="#22C55E" stroke-width="0.8" opacity="0.18"/>
  <circle cx="370" cy="100" r="32" fill="none" stroke="#22C55E" stroke-width="0.5" opacity="0.1"/>
  <circle cx="370" cy="100" r="42" fill="none" stroke="#22C55E" stroke-width="0.3" opacity="0.05"/>
  <circle cx="225" cy="190" r="16" fill="none" stroke="#7C3AED" stroke-width="0.8" opacity="0.15"/>
  <circle cx="225" cy="190" r="24" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.08"/>
  <circle cx="235" cy="210" r="14" fill="none" stroke="#4ADE80" stroke-width="1" opacity="0.2"/>
  <circle cx="235" cy="210" r="22" fill="none" stroke="#4ADE80" stroke-width="0.5" opacity="0.1"/>
  <circle cx="310" cy="230" r="18" fill="none" stroke="#22C55E" stroke-width="0.8" opacity="0.15"/>
  <circle cx="310" cy="230" r="28" fill="none" stroke="#22C55E" stroke-width="0.5" opacity="0.08"/>

  <!-- Major glowing nodes -->
  <!-- Thailand -->
  <g filter="url(#rm-glow-strong)">
    <circle cx="200" cy="110" r="6" fill="url(#rm-node-purple)" opacity="0.95"/>
  </g>
  <circle cx="200" cy="110" r="3" fill="white" opacity="0.7"/>

  <!-- Vietnam -->
  <g filter="url(#rm-glow-strong)">
    <circle cx="260" cy="105" r="5.5" fill="url(#rm-node-green)" opacity="0.95"/>
  </g>
  <circle cx="260" cy="105" r="2.5" fill="white" opacity="0.7"/>

  <!-- Philippines (largest node) -->
  <g filter="url(#rm-glow-strong)">
    <circle cx="370" cy="100" r="8" fill="url(#rm-node-green)" opacity="0.95"/>
  </g>
  <circle cx="370" cy="100" r="4" fill="white" opacity="0.8"/>

  <!-- Malaysia -->
  <g filter="url(#rm-glow-strong)">
    <circle cx="225" cy="190" r="5.5" fill="url(#rm-node-purple)" opacity="0.95"/>
  </g>
  <circle cx="225" cy="190" r="2.5" fill="white" opacity="0.7"/>

  <!-- Singapore -->
  <g filter="url(#rm-glow)">
    <circle cx="235" cy="210" r="5" fill="url(#rm-node-green)" opacity="0.95"/>
  </g>
  <circle cx="235" cy="210" r="2.5" fill="white" opacity="0.7"/>

  <!-- Indonesia -->
  <g filter="url(#rm-glow-strong)">
    <circle cx="310" cy="230" r="6.5" fill="url(#rm-node-green)" opacity="0.95"/>
  </g>
  <circle cx="310" cy="230" r="3" fill="white" opacity="0.7"/>

  <!-- Labels -->
  <g font-family="Arial,sans-serif" font-size="9" font-weight="bold" letter-spacing="1">
    <text x="200" y="96" text-anchor="middle" fill="#C4B5FD" opacity="0.7">THAILAND</text>
    <text x="260" y="90" text-anchor="middle" fill="#86EFAC" opacity="0.7">VIETNAM</text>
    <text x="370" y="82" text-anchor="middle" fill="#86EFAC" opacity="0.8">PHILIPPINES</text>
    <text x="225" y="180" text-anchor="end" fill="#C4B5FD" opacity="0.7">MALAYSIA</text>
    <text x="255" y="222" text-anchor="start" fill="#86EFAC" opacity="0.7">SG</text>
    <text x="310" y="252" text-anchor="middle" fill="#86EFAC" opacity="0.7">INDONESIA</text>
  </g>

  <!-- Decorative edge elements -->
  <g opacity="0.2">
    <circle cx="30" cy="80" r="1" fill="#7C3AED"/>
    <circle cx="45" cy="120" r="1.5" fill="#7C3AED"/>
    <circle cx="35" cy="160" r="1" fill="#7C3AED"/>
    <circle cx="50" cy="200" r="1.5" fill="#22C55E"/>
    <circle cx="40" cy="240" r="1" fill="#22C55E"/>
    <circle cx="560" cy="90" r="1" fill="#22C55E"/>
    <circle cx="550" cy="140" r="1.5" fill="#7C3AED"/>
    <circle cx="565" cy="180" r="1" fill="#7C3AED"/>
    <circle cx="555" cy="220" r="1.5" fill="#22C55E"/>
    <circle cx="150" cy="20" r="1" fill="#7C3AED"/>
    <circle cx="300" cy="15" r="1" fill="#A78BFA"/>
    <circle cx="450" cy="22" r="1" fill="#22C55E"/>
    <circle cx="120" cy="280" r="1" fill="#22C55E"/>
    <circle cx="450" cy="275" r="1" fill="#7C3AED"/>
  </g>

  <!-- Faint connecting lines to edges -->
  <line x1="30" y1="80" x2="200" y2="110" stroke="#7C3AED" stroke-width="0.4" opacity="0.1"/>
  <line x1="560" y1="90" x2="370" y2="100" stroke="#22C55E" stroke-width="0.4" opacity="0.1"/>
  <line x1="40" y1="240" x2="235" y2="210" stroke="#22C55E" stroke-width="0.4" opacity="0.1"/>
  <line x1="555" y1="220" x2="310" y2="230" stroke="#22C55E" stroke-width="0.4" opacity="0.1"/>
</svg>
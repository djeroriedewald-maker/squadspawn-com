<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a825"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
    </pattern>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#grid)"/>
  <rect width="600" height="200" fill="url(#shine)"/>
  <!-- Crown-like decorative element -->
  <polygon points="250,90 270,60 290,80 300,50 310,80 330,60 350,90" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Ornamental circles -->
  <circle cx="300" cy="200" r="120" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="300" cy="200" r="150" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="300" cy="200" r="180" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Corner ornaments -->
  <polyline points="0,50 0,0 50,0" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <polyline points="550,0 600,0 600,50" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <polyline points="0,350 0,400 50,400" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <polyline points="550,400 600,400 600,350" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <!-- Inner corner details -->
  <line x1="10" y1="10" x2="30" y2="10" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="10" y1="10" x2="10" y2="30" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="590" y1="390" x2="570" y2="390" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="590" y1="390" x2="590" y2="370" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Diamond shapes -->
  <polygon points="80,100 100,120 80,140 60,120" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <polygon points="520,280 540,300 520,320 500,300" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <polygon points="100,300 115,315 100,330 85,315" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <polygon points="500,80 515,95 500,110 485,95" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Diagonal lines -->
  <line x1="0" y1="120" x2="120" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <line x1="480" y1="400" x2="600" y2="280" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <!-- Small dots cluster -->
  <circle cx="150" cy="60" r="2" fill="rgba(255,255,255,0.2)"/>
  <circle cx="165" cy="55" r="1.5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="155" cy="75" r="1.5" fill="rgba(255,255,255,0.12)"/>
  <circle cx="450" cy="340" r="2" fill="rgba(255,255,255,0.2)"/>
  <circle cx="435" cy="345" r="1.5" fill="rgba(255,255,255,0.15)"/>
  <!-- Game name -->
  <text x="300" y="195" font-family="sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">Honor of Kings</text>
  <!-- Subtitle -->
  <text x="300" y="235" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="6" font-weight="300">MOBA</text>
  <!-- Accent line -->
  <line x1="250" y1="255" x2="350" y2="255" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>
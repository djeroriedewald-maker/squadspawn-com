<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4654"/>
      <stop offset="100%" stop-color="#0f1923"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <linearGradient id="redline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,70,84,0)"/>
      <stop offset="50%" stop-color="rgba(255,70,84,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,70,84,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#grid)"/>
  <!-- Angular slashes - Valorant style -->
  <polygon points="0,0 200,0 100,400 0,400" fill="rgba(255,255,255,0.02)"/>
  <polygon points="350,0 600,0 600,400 450,400" fill="rgba(0,0,0,0.15)"/>
  <!-- V shape accent -->
  <line x1="240" y1="100" x2="300" y2="140" stroke="rgba(255,70,84,0.2)" stroke-width="2"/>
  <line x1="300" y1="140" x2="360" y2="100" stroke="rgba(255,70,84,0.2)" stroke-width="2"/>
  <!-- Horizontal red accent line -->
  <rect x="0" y="260" width="600" height="1" fill="url(#redline)"/>
  <!-- Corner accents - sharp angular style -->
  <polyline points="0,40 0,0 40,0" fill="none" stroke="rgba(255,70,84,0.5)" stroke-width="2"/>
  <polyline points="560,400 600,400 600,360" fill="none" stroke="rgba(255,70,84,0.5)" stroke-width="2"/>
  <polyline points="560,0 600,0 600,40" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <polyline points="0,360 0,400 40,400" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Tactical dots pattern -->
  <circle cx="80" cy="60" r="2" fill="rgba(255,70,84,0.3)"/>
  <circle cx="100" cy="60" r="2" fill="rgba(255,70,84,0.3)"/>
  <circle cx="120" cy="60" r="2" fill="rgba(255,70,84,0.3)"/>
  <circle cx="80" cy="80" r="2" fill="rgba(255,70,84,0.2)"/>
  <circle cx="100" cy="80" r="2" fill="rgba(255,70,84,0.2)"/>
  <circle cx="120" cy="80" r="2" fill="rgba(255,70,84,0.2)"/>
  <!-- Diamond shapes -->
  <polygon points="520,60 535,75 520,90 505,75" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <polygon points="80,320 95,335 80,350 65,335" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Diagonal lines -->
  <line x1="400" y1="0" x2="500" y2="100" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <line x1="420" y1="0" x2="520" y2="100" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="100" y1="300" x2="200" y2="400" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <!-- Hexagon -->
  <polygon points="500,300 515,290 530,300 530,320 515,330 500,320" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Game name -->
  <text x="300" y="195" font-family="sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="8">VALORANT</text>
  <!-- Subtitle -->
  <text x="300" y="235" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="6" font-weight="300">TACTICAL SHOOTER</text>
  <!-- Bottom accent -->
  <line x1="210" y1="253" x2="390" y2="253" stroke="rgba(255,70,84,0.35)" stroke-width="1"/>
</svg>
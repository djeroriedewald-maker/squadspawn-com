<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#c89b3c"/>
      <stop offset="100%" stop-color="#091428"/>
    </linearGradient>
    <pattern id="grid" width="35" height="35" patternUnits="userSpaceOnUse">
      <path d="M 35 0 L 0 0 0 35" fill="none" stroke="rgba(200,155,60,0.05)" stroke-width="1"/>
    </pattern>
    <linearGradient id="goldline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(200,155,60,0)"/>
      <stop offset="50%" stop-color="rgba(200,155,60,0.4)"/>
      <stop offset="100%" stop-color="rgba(200,155,60,0)"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="rgba(200,155,60,0.1)"/>
      <stop offset="100%" stop-color="rgba(200,155,60,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#grid)"/>
  <rect width="600" height="400" fill="url(#centerGlow)"/>
  <!-- Ornate border lines -->
  <rect x="15" y="15" width="570" height="370" fill="none" stroke="rgba(200,155,60,0.15)" stroke-width="1"/>
  <rect x="20" y="20" width="560" height="360" fill="none" stroke="rgba(200,155,60,0.08)" stroke-width="1"/>
  <!-- Gold corner ornaments -->
  <polyline points="0,50 0,0 50,0" fill="none" stroke="rgba(200,155,60,0.5)" stroke-width="3"/>
  <polyline points="550,0 600,0 600,50" fill="none" stroke="rgba(200,155,60,0.5)" stroke-width="3"/>
  <polyline points="0,350 0,400 50,400" fill="none" stroke="rgba(200,155,60,0.5)" stroke-width="3"/>
  <polyline points="550,400 600,400 600,350" fill="none" stroke="rgba(200,155,60,0.5)" stroke-width="3"/>
  <!-- Corner inner accents -->
  <line x1="8" y1="8" x2="30" y2="8" stroke="rgba(200,155,60,0.25)" stroke-width="1"/>
  <line x1="8" y1="8" x2="8" y2="30" stroke="rgba(200,155,60,0.25)" stroke-width="1"/>
  <line x1="592" y1="392" x2="570" y2="392" stroke="rgba(200,155,60,0.25)" stroke-width="1"/>
  <line x1="592" y1="392" x2="592" y2="370" stroke="rgba(200,155,60,0.25)" stroke-width="1"/>
  <!-- Horizontal gold accent -->
  <rect x="0" y="255" width="600" height="1" fill="url(#goldline)"/>
  <!-- Diamond shapes -->
  <polygon points="80,80 100,100 80,120 60,100" fill="none" stroke="rgba(200,155,60,0.15)" stroke-width="1.5"/>
  <polygon points="520,80 540,100 520,120 500,100" fill="none" stroke="rgba(200,155,60,0.15)" stroke-width="1.5"/>
  <polygon points="80,300 95,315 80,330 65,315" fill="none" stroke="rgba(200,155,60,0.1)" stroke-width="1"/>
  <polygon points="520,300 535,315 520,330 505,315" fill="none" stroke="rgba(200,155,60,0.1)" stroke-width="1"/>
  <!-- Decorative circles -->
  <circle cx="300" cy="200" r="100" fill="none" stroke="rgba(200,155,60,0.05)" stroke-width="1"/>
  <circle cx="300" cy="200" r="130" fill="none" stroke="rgba(200,155,60,0.03)" stroke-width="1"/>
  <!-- Diagonal lines -->
  <line x1="0" y1="150" x2="50" y2="100" stroke="rgba(200,155,60,0.06)" stroke-width="1"/>
  <line x1="550" y1="300" x2="600" y2="250" stroke="rgba(200,155,60,0.06)" stroke-width="1"/>
  <!-- Small dots -->
  <circle cx="150" cy="50" r="1.5" fill="rgba(200,155,60,0.2)"/>
  <circle cx="170" cy="45" r="1.5" fill="rgba(200,155,60,0.15)"/>
  <circle cx="430" cy="355" r="1.5" fill="rgba(200,155,60,0.2)"/>
  <circle cx="450" cy="350" r="1.5" fill="rgba(200,155,60,0.15)"/>
  <!-- Game name -->
  <text x="300" y="185" font-family="sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">League of Legends</text>
  <!-- Subtitle -->
  <text x="300" y="225" font-family="sans-serif" font-size="20" fill="rgba(200,155,60,0.7)" text-anchor="middle" letter-spacing="6" font-weight="300">MOBA</text>
  <!-- Accent line below subtitle -->
  <line x1="250" y1="245" x2="350" y2="245" stroke="rgba(200,155,60,0.3)" stroke-width="1"/>
</svg>
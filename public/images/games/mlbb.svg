<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#grid)"/>
  <!-- Diagonal stripes -->
  <line x1="0" y1="80" x2="80" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="0" y1="160" x2="160" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="0" y1="240" x2="240" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="0" y1="320" x2="320" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="0" y1="400" x2="400" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="80" y1="400" x2="480" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="160" y1="400" x2="560" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="240" y1="400" x2="600" y2="40" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <!-- Hexagonal shapes -->
  <polygon points="500,60 520,48 540,60 540,84 520,96 500,84" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <polygon points="530,90 550,78 570,90 570,114 550,126 530,114" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <polygon points="40,300 60,288 80,300 80,324 60,336 40,324" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <polygon points="60,330 80,318 100,330 100,354 80,366 60,354" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Corner accents -->
  <line x1="0" y1="0" x2="60" y2="0" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <line x1="0" y1="0" x2="0" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <line x1="600" y1="400" x2="540" y2="400" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <line x1="600" y1="400" x2="600" y2="340" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <!-- Decorative circles -->
  <circle cx="520" cy="320" r="30" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="520" cy="320" r="50" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="80" cy="80" r="25" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Diamond -->
  <polygon points="150,50 170,70 150,90 130,70" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <!-- Shine overlay -->
  <rect width="600" height="400" fill="url(#shine)"/>
  <!-- Game name -->
  <text x="300" y="185" font-family="sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">Mobile Legends</text>
  <!-- Subtitle -->
  <text x="300" y="225" font-family="sans-serif" font-size="20" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="6" font-weight="300">MOBA</text>
  <!-- Bottom accent line -->
  <line x1="240" y1="245" x2="360" y2="245" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
</svg>
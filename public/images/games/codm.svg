<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="15" height="15" patternUnits="userSpaceOnUse">
      <circle cx="7.5" cy="7.5" r="0.5" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <linearGradient id="greenline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(76,175,80,0)"/>
      <stop offset="50%" stop-color="rgba(76,175,80,0.3)"/>
      <stop offset="100%" stop-color="rgba(76,175,80,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#grid)"/>
  <rect width="600" height="400" fill="url(#dots)"/>
  <!-- Military-style diagonal stripes -->
  <polygon points="0,0 120,0 0,120" fill="rgba(255,255,255,0.02)"/>
  <polygon points="600,400 480,400 600,280" fill="rgba(255,255,255,0.02)"/>
  <line x1="0" y1="80" x2="80" y2="0" stroke="rgba(76,175,80,0.1)" stroke-width="1.5"/>
  <line x1="0" y1="160" x2="160" y2="0" stroke="rgba(76,175,80,0.07)" stroke-width="1"/>
  <line x1="440" y1="400" x2="600" y2="240" stroke="rgba(76,175,80,0.1)" stroke-width="1.5"/>
  <line x1="520" y1="400" x2="600" y2="320" stroke="rgba(76,175,80,0.07)" stroke-width="1"/>
  <!-- Crosshair -->
  <circle cx="500" cy="90" r="20" fill="none" stroke="rgba(76,175,80,0.2)" stroke-width="1.5"/>
  <circle cx="500" cy="90" r="3" fill="rgba(76,175,80,0.15)"/>
  <line x1="500" y1="65" x2="500" y2="115" stroke="rgba(76,175,80,0.15)" stroke-width="1"/>
  <line x1="475" y1="90" x2="525" y2="90" stroke="rgba(76,175,80,0.15)" stroke-width="1"/>
  <!-- Corner accents - military brackets -->
  <polyline points="0,45 0,0 45,0" fill="none" stroke="rgba(76,175,80,0.4)" stroke-width="2.5"/>
  <polyline points="555,400 600,400 600,355" fill="none" stroke="rgba(76,175,80,0.4)" stroke-width="2.5"/>
  <polyline points="555,0 600,0 600,45" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <polyline points="0,355 0,400 45,400" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Horizontal green accent -->
  <rect x="0" y="258" width="600" height="1" fill="url(#greenline)"/>
  <!-- Hexagonal shapes -->
  <polygon points="80,310 100,298 120,310 120,334 100,346 80,334" fill="none" stroke="rgba(76,175,80,0.1)" stroke-width="1"/>
  <polygon points="50,280 70,268 90,280 90,304 70,316 50,304" fill="none" stroke="rgba(76,175,80,0.06)" stroke-width="1"/>
  <!-- Diamond shapes -->
  <polygon points="530,310 545,325 530,340 515,325" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <polygon points="120,70 135,85 120,100 105,85" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Rank-like star points -->
  <circle cx="300" cy="100" r="3" fill="rgba(76,175,80,0.15)"/>
  <circle cx="280" cy="100" r="2" fill="rgba(76,175,80,0.1)"/>
  <circle cx="320" cy="100" r="2" fill="rgba(76,175,80,0.1)"/>
  <!-- Game name -->
  <text x="300" y="190" font-family="sans-serif" font-size="50" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">Call of Duty</text>
  <!-- Subtitle -->
  <text x="300" y="230" font-family="sans-serif" font-size="18" fill="rgba(76,175,80,0.7)" text-anchor="middle" letter-spacing="6" font-weight="300">MOBILE FPS</text>
  <!-- Accent line -->
  <line x1="230" y1="248" x2="370" y2="248" stroke="rgba(76,175,80,0.25)" stroke-width="1"/>
</svg>
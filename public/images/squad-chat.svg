<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <filter id="sc-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sc-glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="sc-glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Bubble gradients -->
    <linearGradient id="sc-bubble1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="sc-bubble2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="sc-bubble3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="sc-bubble4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="sc-bubble5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>

    <radialGradient id="sc-ambient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="250" cy="200" rx="200" ry="160" fill="url(#sc-ambient)"/>

  <!-- Network connection lines -->
  <g opacity="0.25" stroke-width="1" fill="none">
    <line x1="130" y1="100" x2="310" y2="80" stroke="#7C3AED"/>
    <line x1="310" y1="80" x2="400" y2="155" stroke="#3B82F6"/>
    <line x1="400" y1="155" x2="350" y2="280" stroke="#6366F1"/>
    <line x1="350" y1="280" x2="170" y2="310" stroke="#8B5CF6"/>
    <line x1="170" y1="310" x2="80" y2="220" stroke="#22C55E"/>
    <line x1="80" y1="220" x2="130" y2="100" stroke="#7C3AED"/>
    <line x1="250" y1="190" x2="130" y2="100" stroke="#A78BFA" opacity="0.5"/>
    <line x1="250" y1="190" x2="310" y2="80" stroke="#A78BFA" opacity="0.5"/>
    <line x1="250" y1="190" x2="400" y2="155" stroke="#93C5FD" opacity="0.5"/>
    <line x1="250" y1="190" x2="350" y2="280" stroke="#A5B4FC" opacity="0.5"/>
    <line x1="250" y1="190" x2="170" y2="310" stroke="#C4B5FD" opacity="0.5"/>
    <line x1="250" y1="190" x2="80" y2="220" stroke="#86EFAC" opacity="0.5"/>
  </g>

  <!-- Network dots -->
  <g filter="url(#sc-glow-soft)">
    <circle cx="130" cy="100" r="4" fill="#A78BFA" opacity="0.7"/>
    <circle cx="310" cy="80" r="4" fill="#93C5FD" opacity="0.7"/>
    <circle cx="400" cy="155" r="3.5" fill="#818CF8" opacity="0.7"/>
    <circle cx="350" cy="280" r="4" fill="#A5B4FC" opacity="0.7"/>
    <circle cx="170" cy="310" r="3.5" fill="#C4B5FD" opacity="0.7"/>
    <circle cx="80" cy="220" r="4" fill="#86EFAC" opacity="0.7"/>
    <circle cx="250" cy="190" r="5" fill="#F9A8D4" opacity="0.8"/>
  </g>

  <!-- BUBBLE 1 - Large purple, top-left -->
  <g filter="url(#sc-glow)">
    <rect x="60" y="55" width="180" height="90" rx="20" ry="20" fill="url(#sc-bubble1)" opacity="0.92"/>
    <polygon points="100,145 120,145 90,165" fill="#6D28D9" opacity="0.92"/>
    <!-- Text lines -->
    <rect x="80" y="78" width="100" height="6" rx="3" fill="white" opacity="0.7"/>
    <rect x="80" y="92" width="140" height="6" rx="3" fill="white" opacity="0.5"/>
    <rect x="80" y="106" width="80" height="6" rx="3" fill="white" opacity="0.4"/>
    <!-- Controller icon -->
    <g transform="translate(195, 70)" opacity="0.5">
      <rect x="0" y="3" width="24" height="12" rx="6" fill="white"/>
      <circle cx="7" cy="9" r="2.5" fill="#7C3AED"/>
      <circle cx="17" cy="9" r="2.5" fill="#7C3AED"/>
    </g>
  </g>

  <!-- BUBBLE 2 - Blue, top-right -->
  <g filter="url(#sc-glow)">
    <rect x="280" y="35" width="170" height="75" rx="18" ry="18" fill="url(#sc-bubble2)" opacity="0.9"/>
    <polygon points="400,110 380,110 410,130" fill="#2563EB" opacity="0.9"/>
    <!-- Text lines -->
    <rect x="300" y="56" width="120" height="5" rx="2.5" fill="white" opacity="0.65"/>
    <rect x="300" y="68" width="90" height="5" rx="2.5" fill="white" opacity="0.45"/>
    <rect x="300" y="80" width="110" height="5" rx="2.5" fill="white" opacity="0.5"/>
    <!-- Headset icon -->
    <g transform="translate(420, 48)" opacity="0.45">
      <path d="M3 15 C3 7, 19 7, 19 15" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <rect x="0" y="13" width="6" height="8" rx="2.5" fill="white"/>
      <rect x="16" y="13" width="6" height="8" rx="2.5" fill="white"/>
    </g>
  </g>

  <!-- BUBBLE 3 - Center, larger, purple-indigo -->
  <g filter="url(#sc-glow-strong)">
    <rect x="155" y="155" width="200" height="80" rx="20" ry="20" fill="url(#sc-bubble3)" opacity="0.95"/>
    <polygon points="250,235 270,235 245,258" fill="#6366F1" opacity="0.95"/>
    <!-- Text lines -->
    <rect x="178" y="177" width="150" height="6" rx="3" fill="white" opacity="0.7"/>
    <rect x="178" y="191" width="120" height="6" rx="3" fill="white" opacity="0.5"/>
    <rect x="178" y="205" width="80" height="6" rx="3" fill="white" opacity="0.4"/>
    <!-- GG emoji-like icon -->
    <g transform="translate(312, 195)" opacity="0.6">
      <text font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">GG</text>
    </g>
  </g>

  <!-- BUBBLE 4 - Bottom-left, indigo -->
  <g filter="url(#sc-glow)">
    <rect x="30" y="250" width="155" height="70" rx="16" ry="16" fill="url(#sc-bubble4)" opacity="0.88"/>
    <polygon points="65,320 80,320 55,340" fill="#4F46E5" opacity="0.88"/>
    <!-- Text lines -->
    <rect x="50" y="270" width="110" height="5" rx="2.5" fill="white" opacity="0.6"/>
    <rect x="50" y="282" width="80" height="5" rx="2.5" fill="white" opacity="0.45"/>
    <rect x="50" y="294" width="95" height="5" rx="2.5" fill="white" opacity="0.35"/>
    <!-- Crosshair/target icon -->
    <g transform="translate(148, 258)" opacity="0.45">
      <circle cx="10" cy="10" r="7" fill="none" stroke="white" stroke-width="1.5"/>
      <circle cx="10" cy="10" r="2" fill="white"/>
      <line x1="10" y1="0" x2="10" y2="5" stroke="white" stroke-width="1"/>
      <line x1="10" y1="15" x2="10" y2="20" stroke="white" stroke-width="1"/>
      <line x1="0" y1="10" x2="5" y2="10" stroke="white" stroke-width="1"/>
      <line x1="15" y1="10" x2="20" y2="10" stroke="white" stroke-width="1"/>
    </g>
  </g>

  <!-- BUBBLE 5 - Bottom-right, green accent -->
  <g filter="url(#sc-glow)">
    <rect x="310" y="260" width="150" height="65" rx="16" ry="16" fill="url(#sc-bubble5)" opacity="0.85"/>
    <polygon points="390,325 370,325 400,345" fill="#16A34A" opacity="0.85"/>
    <!-- Text lines -->
    <rect x="328" y="278" width="100" height="5" rx="2.5" fill="white" opacity="0.65"/>
    <rect x="328" y="290" width="70" height="5" rx="2.5" fill="white" opacity="0.45"/>
    <rect x="328" y="302" width="110" height="5" rx="2.5" fill="white" opacity="0.4"/>
    <!-- Trophy icon small -->
    <g transform="translate(425, 268)" opacity="0.5">
      <path d="M4 0 L16 0 L14 12 L6 12 Z" fill="white"/>
      <rect x="8" y="12" width="4" height="4" fill="white"/>
      <rect x="5" y="16" width="10" height="2" rx="1" fill="white"/>
    </g>
  </g>

  <!-- Small floating indicator bubbles -->
  <g filter="url(#sc-glow-soft)">
    <circle cx="470" cy="100" r="8" fill="#6366F1" opacity="0.5"/>
    <circle cx="470" cy="100" r="3" fill="white" opacity="0.5"/>
  </g>
  <g filter="url(#sc-glow-soft)">
    <circle cx="25" cy="170" r="6" fill="#22C55E" opacity="0.45"/>
    <circle cx="25" cy="170" r="2.5" fill="white" opacity="0.4"/>
  </g>
  <g filter="url(#sc-glow-soft)">
    <circle cx="485" cy="300" r="5" fill="#A78BFA" opacity="0.4"/>
    <circle cx="485" cy="300" r="2" fill="white" opacity="0.35"/>
  </g>

  <!-- Typing indicator bubble -->
  <g transform="translate(200, 350)" opacity="0.6">
    <rect x="0" y="0" width="55" height="28" rx="14" fill="#4F46E5" opacity="0.6"/>
    <circle cx="14" cy="14" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="27" cy="14" r="3.5" fill="white" opacity="0.5"/>
    <circle cx="40" cy="14" r="3.5" fill="white" opacity="0.3"/>
  </g>
</svg>